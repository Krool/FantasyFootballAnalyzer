<!doctype html>

    <meta charset="UTF-8" />
    <!-- GitHub Pages SPA redirect decode (pairs with public/404.html). Restores
         the real path from the ?/ query the 404 shim produced, before
         BrowserRouter reads the URL. No-op on normal loads. -->
    <script>
      (function () {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>

    <!-- Google Analytics -->

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // github.io is a public-suffix domain, so gtag's default cookie_domain
