<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- GitHub Pages SPA redirect decode (pairs with public/404.html). Restores
         the real path from the ?/ query the 404 shim produced, before
         BrowserRouter reads the URL. No-op on normal loads. -->
    <script>
      (function () {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Critical background so the prerendered homepage (injected into #root at
         build time for crawlers) paints on-brand before the bundle's CSS loads
         and React replaces it. -->

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SXG8M67HPV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // github.io is a public-suffix domain, so gtag's default cookie_domain
      // of 'auto' tries (and fails) to set cookies on github.io itself.
      gtag('config', 'G-SXG8M67HPV', { cookie_domain: window.location.hostname, content_group: 'Fantasy Football Analyzer' });
    </script>
    <!-- Self-hosted brand fonts (@font-face lives in src/fonts.css). Preload the
         two critical faces so they paint without the swap the old Google Fonts
         two-hop caused: Fraunces (body/display) and Bowlby One (headlines). The
         rest (italics, latin-ext, mono) load on demand from the same origin. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/fraunces-latin-opsz-normal.woff2">
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/bowlby-one-latin-400-normal.woff2">
