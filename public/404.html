<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fantasy Football Analyzer</title>
    <!--
      GitHub Pages SPA redirect (rafrex/spa-github-pages technique).
      Pages has no server-side rewrites, so a deep link like
      /FantasyFootballAnalyzer/rankings 404s. This page encodes the path into a
      query and bounces to the app root, where the decode snippet in index.html
      restores it before BrowserRouter reads the URL. pathSegmentsToKeep = 1
      keeps the project base segment (FantasyFootballAnalyzer).
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
